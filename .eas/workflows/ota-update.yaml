name: OTA update

on:
  push:
    tags:
      - release-*.*.*
      - "!release-*.*.0"

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    env:
      APP_VERSION: ${{ substring(github.ref_name, 8) }}

  resolve_runtime_version:
    name: Resolve runtime version
    outputs:
      runtime_version: ${{ steps.compute.outputs.runtime_version }}
    steps:
      - id: compute
        name: Derive major.minor.0 from branch name
        run: |
          VERSION="${{ substring(github.ref_name, 8) }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          set-output runtime_version "${MAJOR}.${MINOR}.0"

  get_android_build:
    name: Check for existing Android build
    needs: [fingerprint, resolve_runtime_version]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      runtime_version: ${{ needs.resolve_runtime_version.outputs.runtime_version }}
      profile: production

  get_ios_build:
    name: Check for existing iOS build
    needs: [fingerprint, resolve_runtime_version]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      runtime_version: ${{ needs.resolve_runtime_version.outputs.runtime_version }}
      profile: production-simulator # for demonstration purposes only

  verify_builds:
    name: Verify builds exist
    needs: [get_android_build, get_ios_build]
    steps:
      - name: Check Android build
        run: |
          if [ -z "${{ needs.get_android_build.outputs.build_id }}" ]; then
            echo "No Android build found matching fingerprint and runtime version"
            exit 1
          fi
          echo "Android build found: ${{ needs.get_android_build.outputs.build_id }}"
      - name: Check iOS build
        run: |
          if [ -z "${{ needs.get_ios_build.outputs.build_id }}" ]; then
            echo "No iOS build found matching fingerprint and runtime version"
            exit 1
          fi
          echo "iOS build found: ${{ needs.get_ios_build.outputs.build_id }}"

  publish_update:
    name: Publish update
    needs: [verify_builds]
    type: update
    env:
      APP_VERSION: ${{ substring(github.ref_name, 8) }}
    params:
      branch: production
