name: OTA critical update

on:
  push:
    tags:
      - "*.*.*-critical-*"

jobs:
  parse_tag:
    name: Parse tag
    outputs:
      version: ${{ steps.parse.outputs.version }}
      critical_index: ${{ steps.parse.outputs.critical_index }}
      runtime_version: ${{ steps.parse.outputs.runtime_version }}
    steps:
      - id: parse
        name: Extract version and critical index from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "$TAG" | sed 's/-critical-.*$//')
          CRITICAL_INDEX=$(echo "$TAG" | sed 's/.*-critical-//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          echo "version=$VERSION critical_index=$CRITICAL_INDEX runtime=${MAJOR}.${MINOR}.0"
          set-output version "$VERSION"
          set-output critical_index "$CRITICAL_INDEX"
          set-output runtime_version "${MAJOR}.${MINOR}.0"

  fingerprint:
    name: Fingerprint
    needs: [parse_tag]
    type: fingerprint
    env:
      APP_VERSION: ${{ needs.parse_tag.outputs.version }}

  get_android_build:
    name: Check for existing Android build
    needs: [fingerprint, parse_tag]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      runtime_version: ${{ needs.parse_tag.outputs.runtime_version }}
      profile: production

  get_ios_build:
    name: Check for existing iOS build
    needs: [fingerprint, parse_tag]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      runtime_version: ${{ needs.parse_tag.outputs.runtime_version }}
      profile: production-simulator # for demonstration purposes only

  verify_builds:
    name: Verify builds exist
    needs: [get_android_build, get_ios_build, parse_tag]
    steps:
      - name: Check Android build
        run: |
          BUILD_ID="${{ needs.get_android_build.outputs.build_id }}"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "undefined" ]; then
            echo "No Android build found matching fingerprint and runtime version ${{ needs.parse_tag.outputs.runtime_version }}"
            exit 1
          fi
          echo "Android build found: $BUILD_ID"
      - name: Check iOS build
        run: |
          BUILD_ID="${{ needs.get_ios_build.outputs.build_id }}"
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "undefined" ]; then
            echo "No iOS build found matching fingerprint and runtime version ${{ needs.parse_tag.outputs.runtime_version }}"
            exit 1
          fi
          echo "iOS build found: $BUILD_ID"

  publish_update:
    name: Publish critical update
    needs: [verify_builds, parse_tag]
    type: update
    env:
      APP_VERSION: ${{ needs.parse_tag.outputs.version }}
      CRITICAL_INDEX: ${{ needs.parse_tag.outputs.critical_index }}
    params:
      branch: production
